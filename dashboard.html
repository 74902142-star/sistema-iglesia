<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | Iglesia Agua Viva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f8; color: #1a2a3a; }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5298 100%);
            color: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .logo p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.15);
            padding: 8px 24px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }

        /* Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-card:hover { transform: translateY(-6px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15); }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        .stat-value { font-size: 38px; font-weight: 800; color: #1a3a5c; line-height: 1.2; }
        .stat-label { font-size: 14px; color: #6c7a8a; margin-top: 8px; font-weight: 500; }

        /* Report Section */
        .report-section {
            background: white;
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .section-title { font-size: 20px; font-weight: 700; color: #1a2a3a; display: flex; align-items: center; gap: 10px; }
        .report-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 28px;
        }
        .report-card {
            background: #f8fafd;
            border-radius: 24px;
            padding: 24px;
            border-left: 4px solid;
            transition: all 0.3s;
        }
        .report-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .report-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .report-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .report-row:last-child {
            border-bottom: none;
            font-weight: 700;
            background: #eef2ff;
            margin-top: 8px;
            padding: 12px;
            border-radius: 16px;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -8px rgba(37,211,102,0.4); }

        /* Filters */
        .filters-bar {
            background: white;
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .filter-group { flex: 1; min-width: 140px; }
        .filter-group label {
            font-size: 11px;
            font-weight: 700;
            color: #6c7a8a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }
        .filter-select, .filter-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: white;
            transition: all 0.3s;
        }
        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42,82,152,0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2a5298, #1a3a5c);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,58,92,0.3); }
        .btn-secondary {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background: #f8fafc; transform: translateY(-2px); }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .chart-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .chart-card h3 { font-size: 15px; font-weight: 600; color: #6c7a8a; margin-bottom: 20px; }
        canvas { max-height: 200px; width: 100%; }

        /* Table */
        .table-container {
            background: white;
            border-radius: 24px;
            padding: 24px;
            overflow-x: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            text-align: left;
            padding: 14px 12px;
            background: #f8fafd;
            font-weight: 600;
            color: #1a2a3a;
            border-bottom: 2px solid #e2e8f0;
        }
        .data-table td { padding: 14px 12px; border-bottom: 1px solid #eef2f8; }
        .data-table tr:hover { background: #f8fafd; }
        .btn-edit {
            background: #2a5298;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            margin-right: 8px;
            transition: all 0.2s;
        }
        .btn-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-edit:hover, .btn-delete:hover { transform: scale(1.02); opacity: 0.9; }
        .empty-state { text-align: center; padding: 60px; color: #94a3b8; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header {
            background: linear-gradient(135deg, #2a5298, #1a3a5c);
            color: white;
            padding: 20px 24px;
            border-radius: 40px 40px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
        .modal-body { padding: 28px; }
        .double-input { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 12px; font-weight: 700; color: #1a2a3a; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .form-control:focus { outline: none; border-color: #2a5298; }
        .ministerio-card {
            background: #f8fafd;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .ministerio-nombre { font-weight: 700; margin-bottom: 12px; color: #1a3a5c; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: 500;
            z-index: 1100;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .report-cards { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .report-cards { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
            .filters-bar { flex-direction: column; }
            .filter-group { width: 100%; }
            .btn-primary, .btn-secondary { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>⛪ Iglesia Agua Viva</h1>
            <p>Sistema de Gestión de Servicios</p>
        </div>
        <div class="user-area">
            <div>
                <div class="user-name" id="userName">Cargando...</div>
                <div class="user-role" id="userRole"></div>
            </div>
            <button class="logout-btn" onclick="cerrarSesion()">Salir</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="report-section">
            <div class="section-header">
                <div class="section-title">📊 REPORTE DE SERVICIOS <span id="filtroInfo" style="font-size:13px;color:#6c7a8a;"></span></div>
            </div>
            <div class="report-cards" id="reportCards"></div>
            <button class="btn-whatsapp" id="whatsappBtn">📱 ENVIAR REPORTE POR WHATSAPP</button>
        </div>

        <div class="filters-bar">
            <div class="filter-group"><label>📍 SEDE</label><select id="filtroSede" class="filter-select"><option value="todas">Todas las sedes</option></select></div>
            <div class="filter-group"><label>📅 SEMANA</label><input type="week" id="filtroSemana" class="filter-input"></div>
            <div class="filter-group"><label>📆 MES</label><select id="filtroMes" class="filter-select"><option value="">Todos</option></select></div>
            <div class="filter-group"><label>🗓️ AÑO</label><select id="filtroAnio" class="filter-select"><option value="2026" selected>2026</option><option value="2025">2025</option></select></div>
            <button class="btn-primary" onclick="cargarDatos()">🔍 Filtrar</button>
            <button class="btn-secondary" onclick="window.location.href='ingreso.html'">➕ Nuevo registro</button>
            <button class="btn-secondary" onclick="exportarExcel()">📎 Exportar Excel</button>
        </div>

        <div class="charts-grid">
            <div class="chart-card"><h3>📊 Asistencia por sede</h3><canvas id="chartSedes"></canvas></div>
            <div class="chart-card"><h3>📈 Tendencia semanal</h3><canvas id="chartTendencia"></canvas></div>
            <div class="chart-card"><h3>👥 Varones vs Mujeres</h3><canvas id="chartGenero"></canvas></div>
        </div>

        <div class="table-container">
            <h3 style="margin-bottom:20px;">📋 Historial de registros</h3>
            <table class="data-table">
                <thead><tr><th>Fecha</th><th>Sede</th><th>Semana</th><th>Total</th><th>Varones</th><th>Mujeres</th><th>Kids</th><th>Acciones</th></tr></thead>
                <tbody id="tablaBody"><tr><td colspan="8" class="empty-state">No hay registros</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- Modal de edición -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>✏️ Editar registro</h3><button class="modal-close" onclick="cerrarModal()">&times;</button></div>
            <div class="modal-body" id="editModalBody"></div>
        </div>
    </div>

    <script>
        // Usuario actual
        let usuarioActual = JSON.parse(localStorage.getItem('usuarioActual') || '{"nombre":"Jhon Smith","rol":"admin"}');
        let esAdmin = usuarioActual.rol === 'admin';

        // Datos de registros
        let registros = JSON.parse(localStorage.getItem('registrosIglesia') || '[]');
        if (registros.length === 0) {
            registros = [
                { id: 1, fecha: "2026-04-27", sede: "san_carlos_10am", semana: "2026-W17", totalGeneral: 115, totalVarones: 53, totalMujeres: 62, totalKV: 12, totalKM: 18, ministerios: {}, asistentes: {} },
                { id: 2, fecha: "2026-04-20", sede: "el_tambo_12pm", semana: "2026-W16", totalGeneral: 85, totalVarones: 40, totalMujeres: 45, totalKV: 8, totalKM: 10, ministerios: {}, asistentes: {} }
            ];
            localStorage.setItem('registrosIglesia', JSON.stringify(registros));
        }

        let datosFiltrados = [...registros];
        let chartSedes, chartTendencia, chartGenero;
        let registroEditando = null;

        function formatearSede(sedeId) {
            const sedes = {
                'san_carlos_10am': 'San Carlos 10am', 'san_carlos_12pm': 'San Carlos 12pm',
                'san_carlos_5pm': 'San Carlos 5pm', 'san_carlos_7pm': 'San Carlos 7pm',
                'el_tambo_12pm': 'El Tambo 12pm', 'el_tambo_6pm': 'El Tambo 6pm',
                'chupaca_6pm': 'Chupaca 6pm', 'jauja': 'Jauja', 'belen': 'Belén',
                'transformando_ciudades': 'Transformando Ciudades'
            };
            return sedes[sedeId] || sedeId;
        }

        function cargarDatos() {
            let sede = document.getElementById('filtroSede').value;
            let semana = document.getElementById('filtroSemana').value;
            let mes = document.getElementById('filtroMes').value;
            let anio = document.getElementById('filtroAnio').value;

            datosFiltrados = registros.filter(r => {
                if (sede !== 'todas' && r.sede !== sede) return false;
                if (semana && r.semana !== semana) return false;
                if (mes && r.mes !== mes) return false;
                if (anio && !r.fecha.startsWith(anio)) return false;
                return true;
            });

            actualizarStats();
            actualizarReportes();
            actualizarTabla();
            actualizarGraficos();

            let info = [];
            if (semana) info.push('Semana ' + semana);
            if (mes) info.push('Mes ' + mes);
            if (anio) info.push(anio);
            document.getElementById('filtroInfo').innerText = info.length ? '(' + info.join(' - ') + ')' : '';
        }

        function actualizarStats() {
            let total = 0, varones = 0, mujeres = 0, kids = 0;
            for (let d of datosFiltrados) {
                total += d.totalGeneral;
                varones += d.totalVarones;
                mujeres += d.totalMujeres;
                kids += (d.totalKV || 0) + (d.totalKM || 0);
            }
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${total}</div><div class="stat-label">Total asistentes</div></div>
                <div class="stat-card"><div class="stat-icon">👨</div><div class="stat-value">${varones}</div><div class="stat-label">Varones</div></div>
                <div class="stat-card"><div class="stat-icon">👩</div><div class="stat-value">${mujeres}</div><div class="stat-label">Mujeres</div></div>
                <div class="stat-card"><div class="stat-icon">🧒</div><div class="stat-value">${kids}</div><div class="stat-label">Kids</div></div>
            `;
        }

        function actualizarReportes() {
            let nextT = 0, nextH = 0, nextM = 0, domT = 0, domH = 0, domM = 0, kidsT = 0, kidsH = 0, kidsM = 0;
            for (let d of datosFiltrados) {
                let esNext = d.sede.includes('5pm') || d.sede.includes('7pm');
                if (esNext) {
                    nextT += d.totalGeneral; nextH += d.totalVarones; nextM += d.totalMujeres;
                } else {
                    domT += d.totalGeneral; domH += d.totalVarones; domM += d.totalMujeres;
                }
                kidsT += (d.totalKV || 0) + (d.totalKM || 0);
                kidsH += d.totalKV || 0;
                kidsM += d.totalKM || 0;
            }
            document.getElementById('reportCards').innerHTML = `
                <div class="report-card" style="border-left-color:#10b981">
                    <h3>☀️ DOMINGO</h3>
                    <div class="report-row"><span>👨 Hombres</span><span>${domH}</span></div>
                    <div class="report-row"><span>👩 Mujeres</span><span>${domM}</span></div>
                    <div class="report-row"><span>👥 Total</span><span><strong>${domT}</strong></span></div>
                </div>
                <div class="report-card" style="border-left-color:#3b82f6">
                    <h3>🌙 NEXT (Sábados)</h3>
                    <div class="report-row"><span>👨 Hombres</span><span>${nextH}</span></div>
                    <div class="report-row"><span>👩 Mujeres</span><span>${nextM}</span></div>
                    <div class="report-row"><span>👥 Total</span><span><strong>${nextT}</strong></span></div>
                </div>
                <div class="report-card" style="border-left-color:#f59e0b">
                    <h3>🧒 KIDS</h3>
                    <div class="report-row"><span>👨 Niños</span><span>${kidsH}</span></div>
                    <div class="report-row"><span>👩 Niñas</span><span>${kidsM}</span></div>
                    <div class="report-row"><span>👥 Total</span><span><strong>${kidsT}</strong></span></div>
                </div>
            `;
            document.getElementById('whatsappBtn').onclick = () => {
                let semana = document.getElementById('filtroSemana').value || 'General';
                let fecha = new Date().toLocaleDateString();
                let msg = `IGLESIA AGUA VIVA\nREPORTE ${semana}\n${fecha}\n\nNEXT (Sábados): ${nextT}\nHombres: ${nextH} | Mujeres: ${nextM}\n\nDOMINGO: ${domT}\nHombres: ${domH} | Mujeres: ${domM}\n\nKIDS: ${kidsT}\nNiños: ${kidsH} | Niñas: ${kidsM}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };
        }

        function actualizarTabla() {
            let tbody = document.getElementById('tablaBody');
            if (datosFiltrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No hay registros</td></tr>';
                return;
            }
            let html = '';
            for (let d of datosFiltrados) {
                let kidsVal = (d.totalKV || 0) + (d.totalKM || 0);
                let acciones = '';
                if (esAdmin) {
                    acciones = `<button class="btn-edit" onclick="abrirEditar(${d.id})">✏️ Editar</button>
                               <button class="btn-delete" onclick="eliminarRegistro(${d.id})">🗑️ Eliminar</button>`;
                }
                html += `<tr>
                    <td>${d.fecha}</td>
                    <td>${formatearSede(d.sede)}</td>
                    <td>${d.semana}</td>
                    <td><strong>${d.totalGeneral}</strong></td>
                    <td>${d.totalVarones}</td>
                    <td>${d.totalMujeres}</td>
                    <td>${kidsVal}</td>
                    <td>${acciones}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        function actualizarGraficos() {
            let sedesMap = {};
            for (let d of datosFiltrados) sedesMap[d.sede] = (sedesMap[d.sede] || 0) + d.totalGeneral;
            if (chartSedes) chartSedes.destroy();
            chartSedes = new Chart(document.getElementById('chartSedes'), {
                type: 'bar', data: { labels: Object.keys(sedesMap).map(s => formatearSede(s)), datasets: [{ label: 'Asistentes', data: Object.values(sedesMap), backgroundColor: '#2a5298', borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
            let semanasMap = {};
            for (let d of datosFiltrados) semanasMap[d.semana] = (semanasMap[d.semana] || 0) + d.totalGeneral;
            let semanasOrdenadas = Object.keys(semanasMap).sort();
            if (chartTendencia) chartTendencia.destroy();
            chartTendencia = new Chart(document.getElementById('chartTendencia'), {
                type: 'line', data: { labels: semanasOrdenadas, datasets: [{ label: 'Asistencia', data: semanasOrdenadas.map(s => semanasMap[s]), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
            let totalV = datosFiltrados.reduce((s, d) => s + d.totalVarones, 0);
            let totalM = datosFiltrados.reduce((s, d) => s + d.totalMujeres, 0);
            if (chartGenero) chartGenero.destroy();
            chartGenero = new Chart(document.getElementById('chartGenero'), {
                type: 'doughnut', data: { labels: ['Varones', 'Mujeres'], datasets: [{ data: [totalV, totalM], backgroundColor: ['#2a5298', '#ec489a'] }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }

        // Funciones de edición/eliminación (solo admin)
        function abrirEditar(id) {
            if (!esAdmin) return;
            let registro = registros.find(r => r.id === id);
            if (!registro) return;
            registroEditando = registro;
            mostrarModalEdicion(registro);
        }

        function mostrarModalEdicion(reg) {
            let html = `
                <div class="form-group"><label>📅 FECHA</label><input type="date" id="editFecha" class="form-control" value="${reg.fecha}"></div>
                <div class="form-group"><label>📍 SEDE</label><select id="editSede" class="form-control">
                    <option value="san_carlos_10am" ${reg.sede === 'san_carlos_10am' ? 'selected' : ''}>San Carlos 10am</option>
                    <option value="san_carlos_12pm" ${reg.sede === 'san_carlos_12pm' ? 'selected' : ''}>San Carlos 12pm</option>
                    <option value="san_carlos_5pm" ${reg.sede === 'san_carlos_5pm' ? 'selected' : ''}>San Carlos 5pm</option>
                    <option value="san_carlos_7pm" ${reg.sede === 'san_carlos_7pm' ? 'selected' : ''}>San Carlos 7pm</option>
                    <option value="el_tambo_12pm" ${reg.sede === 'el_tambo_12pm' ? 'selected' : ''}>El Tambo 12pm</option>
                    <option value="el_tambo_6pm" ${reg.sede === 'el_tambo_6pm' ? 'selected' : ''}>El Tambo 6pm</option>
                    <option value="chupaca_6pm" ${reg.sede === 'chupaca_6pm' ? 'selected' : ''}>Chupaca 6pm</option>
                    <option value="jauja" ${reg.sede === 'jauja' ? 'selected' : ''}>Jauja</option>
                    <option value="belen" ${reg.sede === 'belen' ? 'selected' : ''}>Belén</option>
                    <option value="transformando_ciudades" ${reg.sede === 'transformando_ciudades' ? 'selected' : ''}>Transformando Ciudades</option>
                </select></div>
                <div class="double-input">
                    <div class="form-group"><label>👥 TOTAL</label><input type="number" id="editTotal" class="form-control" value="${reg.totalGeneral}" min="0"></div>
                    <div class="form-group"><label>🧒 KIDS</label><input type="number" id="editKids" class="form-control" value="${(reg.totalKV||0)+(reg.totalKM||0)}" min="0"></div>
                </div>
                <div class="double-input">
                    <div class="form-group"><label>👨 VARONES</label><input type="number" id="editVarones" class="form-control" value="${reg.totalVarones}" min="0"></div>
                    <div class="form-group"><label>👩 MUJERES</label><input type="number" id="editMujeres" class="form-control" value="${reg.totalMujeres}" min="0"></div>
                </div>
                <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="guardarEdicion()">💾 Guardar cambios</button>
            `;
            document.getElementById('editModalBody').innerHTML = html;
            document.getElementById('editModal').style.display = 'flex';
        }

        function guardarEdicion() {
            let index = registros.findIndex(r => r.id === registroEditando.id);
            if (index !== -1) {
                let kids = parseInt(document.getElementById('editKids').value) || 0;
                registros[index] = {
                    ...registros[index],
                    fecha: document.getElementById('editFecha').value,
                    sede: document.getElementById('editSede').value,
                    semana: obtenerSemana(document.getElementById('editFecha').value),
                    totalGeneral: parseInt(document.getElementById('editTotal').value) || 0,
                    totalVarones: parseInt(document.getElementById('editVarones').value) || 0,
                    totalMujeres: parseInt(document.getElementById('editMujeres').value) || 0,
                    totalKV: kids,
                    totalKM: 0
                };
                localStorage.setItem('registrosIglesia', JSON.stringify(registros));
                registros = JSON.parse(localStorage.getItem('registrosIglesia') || '[]');
                toast('✅ Registro actualizado');
                cerrarModal();
                cargarDatos();
            }
        }

        function eliminarRegistro(id) {
            if (!esAdmin) return;
            if (confirm('¿Eliminar este registro permanentemente?')) {
                registros = registros.filter(r => r.id !== id);
                localStorage.setItem('registrosIglesia', JSON.stringify(registros));
                toast('🗑️ Registro eliminado');
                cargarDatos();
            }
        }

        function obtenerSemana(fecha) {
            let d = new Date(fecha);
            let year = d.getFullYear();
            let start = new Date(year, 0, 1);
            let days = Math.floor((d - start) / (24 * 60 * 60 * 1000));
            let week = Math.ceil((days + start.getDay() + 1) / 7);
            return `${year}-W${week.toString().padStart(2, '0')}`;
        }

        function cerrarModal() { document.getElementById('editModal').style.display = 'none'; }

        function exportarExcel() {
            let datos = datosFiltrados.map(d => ({
                Fecha: d.fecha, Sede: formatearSede(d.sede), Semana: d.semana,
                Total: d.totalGeneral, Varones: d.totalVarones, Mujeres: d.totalMujeres,
                Kids: (d.totalKV || 0) + (d.totalKM || 0)
            }));
            let ws = XLSX.utils.json_to_sheet(datos);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Reporte');
            XLSX.writeFile(wb, `iglesia_${new Date().toISOString().split('T')[0]}.xlsx`);
            toast('📎 Excel exportado');
        }

        function toast(msg) { let t = document.createElement('div'); t.className = 'toast toast-success'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }

        function inicializarFiltros() {
            let sedes = ['san_carlos_10am', 'san_carlos_12pm', 'san_carlos_5pm', 'san_carlos_7pm', 'el_tambo_12pm', 'el_tambo_6pm', 'chupaca_6pm', 'jauja', 'belen', 'transformando_ciudades'];
            let selectSede = document.getElementById('filtroSede');
            for (let s of sedes) { let opt = document.createElement('option'); opt.value = s; opt.textContent = formatearSede(s); selectSede.appendChild(opt); }
            let selectMes = document.getElementById('filtroMes');
            for (let i = 1; i <= 12; i++) { let opt = document.createElement('option'); opt.value = `2026-${String(i).padStart(2, '0')}`; opt.textContent = `Mes ${i}`; selectMes.appendChild(opt); }
            let hoy = new Date(); let semana = `${hoy.getFullYear()}-W${Math.ceil(((hoy - new Date(hoy.getFullYear(), 0, 1)) / 86400000 + 1) / 7)}`;
            document.getElementById('filtroSemana').value = semana;
        }

        function cargarUsuario() {
            document.getElementById('userName').innerText = usuarioActual.nombre || 'Administrador';
            document.getElementById('userRole').innerText = esAdmin ? '👑 Administrador' : '📋 Líder de sede';
        }

        cargarUsuario();
        inicializarFiltros();
        cargarDatos();
    </script>
</body>
</html>
