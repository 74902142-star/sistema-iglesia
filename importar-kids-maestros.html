    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { background: #fff; border-radius: 20px; padding: 40px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; font-weight: 800; color: #00334f; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat { background: #f8fafc; border-radius: 12px; padding: 16px; text-align: center; }
        .stat .value { font-size: 28px; font-weight: 800; color: #00334f; }
        .stat .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #00334f, #1c6390); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,51,79,0.3); }
        .btn-danger { background: #dc2626; color: #fff; margin-top: 12px; }
        .btn-danger:hover { background: #b91c1c; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .log { margin-top: 24px; max-height: 300px; overflow-y: auto; background: #f8fafc; border-radius: 12px; padding: 16px; font-family: monospace; font-size: 13px; line-height: 1.8; }
        .log .ok { color: #16a34a; }
        .log .err { color: #dc2626; }
        .log .info { color: #1c6390; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Importar Maestros KIDS</h1>
        <p class="subtitle">33 maestros pre-registrados desde WhatsApp</p>
        <div class="stats">
            <div class="stat"><div class="value" id="totalMaestros">33</div><div class="label">Total</div></div>
            <div class="stat"><div class="value" id="importados">0</div><div class="label">Importados</div></div>
            <div class="stat"><div class="value" id="duplicados">0</div><div class="label">Duplicados</div></div>
        </div>
        <button class="btn btn-primary" id="btnImportar" onclick="importar()">Importar Maestros</button>
        <button class="btn btn-danger" onclick="if(confirm('¿Eliminar TODOS los maestros KIDS?'))limpiar()">Limpiar colección</button>
        <div class="log" id="log"></div>
    </div>
    <script>

        ];

        let logEl;
        function log(msg, cls = '') {
            if (!logEl) logEl = document.getElementById('log');
            logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function importar() {
            const btn = document.getElementById('btnImportar');
            btn.disabled = true;
            btn.textContent = '⏳ Importando...';
            let importados = 0, duplicados = 0;

            const db = firebase.firestore();
            const col = db.collection('kids_maestros');

            for (const m of maestros) {
                try {
                    const exist = await col.where('dni', '==', m.dni).get();
                    if (!exist.empty) {
                        duplicados++;
                        log(`⏭️ ${m.nombres} (DNI ${m.dni}) — ya existe`, 'info');
                        continue;
                    }
                    await col.add({
                        ...m,
                        createdAt: new Date().toISOString(),
                        origen: 'importacion'
                    });
                    importados++;
                    log(`✅ ${m.nombres} (DNI ${m.dni}) — importado`, 'ok');
                } catch (e) {
                    log(`❌ ${m.nombres} — error: ${e.message}`, 'err');
                }
                document.getElementById('importados').textContent = importados;
                document.getElementById('duplicados').textContent = duplicados;
            }

            log(`\n🏁 Fin: ${importados} importados, ${duplicados} duplicados`, 'info');
            btn.textContent = '✅ Importación completa';
        }

        async function limpiar() {
            const db = firebase.firestore();
            const snap = await db.collection('kids_maestros').get();
            let count = 0;
            for (const doc of snap.docs) {
                await doc.ref.delete();
                count++;
            }
            log(`🗑️ ${count} documentos eliminados`, 'err');
        }
    </script>
