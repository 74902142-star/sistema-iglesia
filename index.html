<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Iglesia Agua Viva | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-wrapper { width: 100%; max-width: 480px; }
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            font-size: 64px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            width: 80px;
            height: 80px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo h1 { font-size: 26px; font-weight: 800; color: #1e293b; }
        .logo p { color: #64748b; font-size: 14px; margin-top: 8px; }
        
        .form-group { margin-bottom: 24px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 8px; display: block; }
        .input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            padding: 14px;
            border-radius: 60px;
            color: white;
            text-align: center;
            z-index: 1000;
            animation: slideUp 0.3s;
            font-weight: 500;
        }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Loading */
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .btn-loading:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">⛪</div>
                <h1>Iglesia Agua Viva</h1>
                <p>Sistema de Gestión de Servicios</p>
            </div>
            
            <div class="form-group">
                <label>📧 Correo Electrónico</label>
                <input type="email" id="loginEmail" class="input" placeholder="correo@ejemplo.com" autocomplete="off">
            </div>
            <div class="form-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="loginPassword" class="input" placeholder="••••••••" autocomplete="off">
            </div>
            
            <button id="loginBtn" class="btn">Iniciar Sesión</button>
        </div>
    </div>

    <script>
        // Usuarios predefinidos
        const USERS = [
            { email: "jhonfernandezcondor@gmail.com", password: "JSferco18", nombre: "Jhon Smith", rol: "admin" },
            { email: "kperezsuasnabar@gmail.com", password: "72566646", nombre: "Patricia Perez", rol: "admin" }
        ];
        
        // Inicializar localStorage si no existe
        if (!localStorage.getItem('iglesia_usuarios')) {
            localStorage.setItem('iglesia_usuarios', JSON.stringify(USERS));
        }
        
        // Función para mostrar notificaciones
        function mostrarNotificacion(mensaje, tipo) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            toast.innerText = mensaje;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Función de login
        function iniciarSesion() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                mostrarNotificacion('❌ Completa todos los campos', 'error');
                return;
            }
            
            // Deshabilitar botón mientras procesa
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.innerText = 'Ingresando...';
            
            setTimeout(() => {
                const usuarios = JSON.parse(localStorage.getItem('iglesia_usuarios') || '[]');
                const usuario = usuarios.find(u => u.email === email && u.password === password);
                
                if (usuario) {
                    // Guardar usuario actual
                    localStorage.setItem('usuarioActual', JSON.stringify({
                        nombre: usuario.nombre,
                        email: usuario.email,
                        rol: usuario.rol,
                        sede: usuario.sede || 'admin'
                    }));
                    mostrarNotificacion('✅ ¡Bienvenido ' + usuario.nombre + '!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    mostrarNotificacion('❌ Correo o contraseña incorrectos', 'error');
                    btn.disabled = false;
                    btn.classList.remove('btn-loading');
                    btn.innerText = 'Iniciar Sesión';
                }
            }, 300);
        }
        
        // Configurar eventos
        document.addEventListener('DOMContentLoaded', function() {
            const emailInput = document.getElementById('loginEmail');
            const passwordInput = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            
            // Click en el botón
            loginBtn.addEventListener('click', iniciarSesion);
            
            // Presionar ENTER en cualquier campo
            emailInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    iniciarSesion();
                }
            });
            
            passwordInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    iniciarSesion();
                }
            });
        });
        
        // Limpiar loading si la página se recarga
        window.onload = function() {
            const btn = document.getElementById('loginBtn');
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.innerText = 'Iniciar Sesión';
            }
        };
    </script>
</body>
</html>
