<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Iglesia Agua Viva | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1b3d70 0%, #0c1a2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1e293b;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background-color: #eff6ff;
            color: #1b4570;
            border-radius: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(27, 69, 112, 0.1);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .logo p {
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s;
            background: #f8fafc;
            color: #0f172a;
        }

        .input:focus {
            outline: none;
            border-color: #1b4570;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(27, 69, 112, 0.1);
        }

        .input::placeholder {
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #1b4570;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            box-shadow: 0 4px 10px rgba(27, 69, 112, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #26598c;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(27, 69, 112, 0.25);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .guest-card {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 8px;
        }

        .guest-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .guest-card p {
            font-size: 12.5px;
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .btn-guest {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-guest:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(16, 185, 129, 0.25);
        }

        .btn-guest:active {
            transform: translateY(0);
        }

        .btn-link-admin {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .btn-link-admin:hover {
            color: #1b4570;
        }

        .admin-section {
            display: none;
        }

        .admin-section.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            padding: 14px;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i data-lucide="church" style="width: 28px; height: 28px;"></i>
                </div>
                <h1>Iglesia Agua Viva</h1>
                <p>Sistema de Gestión de Servicios</p>
            </div>
            
            <div class="guest-card">
                <h3><i data-lucide="user-check" style="width: 18px; height: 18px; color: #10b981;"></i> Acceso invitado</h3>
                <p>Ingresa tu nombre para acceder a los módulos de <strong>Reporte de Asistencia</strong> y <strong>EDL (Escuela de Liderazgo)</strong>.</p>
                <div class="form-group" style="margin-bottom:16px;">
                    <label>Tu nombre</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="user" style="width: 18px; height: 18px;"></i></span>
                        <input type="text" id="guestName" class="input" placeholder="Ej: María - Líder San Carlos">
                    </div>
                </div>
                <button type="button" class="btn-guest" id="guestBtn">Continuar <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i></button>
            </div>

            <div class="divider">o acceso administrador</div>

            <div id="adminSection" class="admin-section">
                <div class="form-group">
                    <label>📧 Correo Electrónico</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="mail" style="width: 18px; height: 18px;"></i></span>
                        <input type="email" id="loginEmail" class="input" placeholder="tu@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="lock" style="width: 18px; height: 18px;"></i></span>
                        <input type="password" id="loginPassword" class="input" placeholder="••••••••">
                    </div>
                </div>
                <button id="loginBtn" class="btn"><i data-lucide="log-in" style="width: 16px; height: 16px;"></i> Iniciar sesión (Admin)</button>
            </div>

            <a href="#" class="btn-link-admin" id="toggleAdmin">¿Eres administrador? Mostrar login</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Init Lucide
        if (typeof lucide !== 'undefined') lucide.createIcons();

        const USERS = [
            { email: "jhonfernandezcondor@gmail.com", password: "JSferco18", nombre: "Jhon Smith", rol: "admin" },
            { email: "kperezsuasnabar@gmail.com", password: "72566646", nombre: "Patricia Perez", rol: "admin" }
        ];

        if (!localStorage.getItem('iglesia_usuarios')) {
            localStorage.setItem('iglesia_usuarios', JSON.stringify(USERS));
        }

        if (Auth.esAdmin()) {
            window.location.href = 'dashboard.html';
        }
        if (Auth.esInvitado()) {
            window.location.href = 'guest.html';
        }

        const adminSection = document.getElementById('adminSection');
        const toggleAdmin = document.getElementById('toggleAdmin');
        let adminVisible = false;

        toggleAdmin.addEventListener('click', (e) => {
            e.preventDefault();
            adminVisible = !adminVisible;
            adminSection.classList.toggle('visible', adminVisible);
            toggleAdmin.textContent = adminVisible ? 'Volver a modo invitado' : '¿Eres administrador? Mostrar login';
        });

        document.getElementById('guestBtn').addEventListener('click', () => {
            const nombre = document.getElementById('guestName').value.trim();
            Auth.entrarComoInvitado(nombre);
            mostrarNotificacion('✅ Bienvenido ' + (nombre || 'Invitado'), 'success');
            setTimeout(() => window.location.href = 'guest.html', 500);
        });

        document.getElementById('guestName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('guestBtn').click();
        });

        function mostrarNotificacion(mensaje, tipo) {
            const t = document.createElement('div');
            t.className = `toast toast-${tipo}`;
            t.innerText = mensaje;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function iniciarSesion() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                mostrarNotificacion('❌ Completa todos los campos', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Ingresando...';

            setTimeout(() => {
                const usuarios = JSON.parse(localStorage.getItem('iglesia_usuarios') || '[]');
                const usuario = usuarios.find(u => u.email === email && u.password === password);

                if (usuario) {
                    localStorage.setItem('usuarioActual', JSON.stringify({
                        nombre: usuario.nombre,
                        email: usuario.email,
                        rol: usuario.rol,
                        sede: usuario.sede || 'admin'
                    }));
                    mostrarNotificacion('✅ ¡Bienvenido ' + usuario.nombre + '!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    mostrarNotificacion('❌ Correo o contraseña incorrectos', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i data-lucide="log-in" style="width: 16px; height: 16px;"></i> Iniciar sesión (Admin)';
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }
            }, 300);
        }

        document.getElementById('loginEmail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('loginBtn').addEventListener('click', iniciarSesion);
    </script>
</body>
</html>
