<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Iglesia Agua Viva | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .guest-card {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border: 2px solid #bae6fd;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 8px;
        }
        .guest-card h3 { font-size: 16px; color: #1a3a5c; margin-bottom: 8px; }
        .guest-card p { font-size: 13px; color: #64748b; margin-bottom: 16px; line-height: 1.5; }

        .btn-guest {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-guest:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16,185,129,0.4);
        }

        .btn-link-admin {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-link-admin:hover { color: #2563eb; }

        .admin-section { display: none; }
        .admin-section.visible { display: block; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            padding: 14px;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">⛪</div>
                <h1>Iglesia Agua Viva</h1>
                <p>Sistema de Gestión de Servicios</p>
            </div>
            <div class="guest-card">
                <h3>📝 Modo invitado</h3>
                <p>Para líderes de sede: registra la asistencia del servicio sin iniciar sesión. El administrador verá tu reporte en el dashboard.</p>
                <div class="form-group" style="margin-bottom:16px;">
                    <label>Tu nombre (opcional)</label>
                    <input type="text" id="guestName" class="input" placeholder="Ej: María - Líder San Carlos">
                </div>
                <button type="button" class="btn-guest" id="guestBtn">➡️ Registrar asistencia</button>
            </div>

            <div class="divider">o acceso administrador</div>

            <div id="adminSection" class="admin-section">
            <div class="form-group">
                <label>📧 Correo Electrónico</label>
                <input type="email" id="loginEmail" class="input" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="loginPassword" class="input" placeholder="••••••••">
            </div>
            <button id="loginBtn" class="btn">🔐 Iniciar sesión (Admin)</button>
            </div>

            <a href="#" class="btn-link-admin" id="toggleAdmin">¿Eres administrador? Mostrar login</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const USERS = [
            { email: "jhonfernandezcondor@gmail.com", password: "JSferco18", nombre: "Jhon Smith", rol: "admin" },
            { email: "kperezsuasnabar@gmail.com", password: "72566646", nombre: "Patricia Perez", rol: "admin" }
        ];

        if (!localStorage.getItem('iglesia_usuarios')) {
            localStorage.setItem('iglesia_usuarios', JSON.stringify(USERS));
        }

        if (Auth.esAdmin()) {
            window.location.href = 'dashboard.html';
        }
        if (Auth.esInvitado()) {
            window.location.href = 'ingreso.html';
        }

        const adminSection = document.getElementById('adminSection');
        const toggleAdmin = document.getElementById('toggleAdmin');
        let adminVisible = false;

        toggleAdmin.addEventListener('click', (e) => {
            e.preventDefault();
            adminVisible = !adminVisible;
            adminSection.classList.toggle('visible', adminVisible);
            toggleAdmin.textContent = adminVisible ? 'Volver a modo invitado' : '¿Eres administrador? Mostrar login';
        });

        document.getElementById('guestBtn').addEventListener('click', () => {
            const nombre = document.getElementById('guestName').value.trim();
            Auth.entrarComoInvitado(nombre);
            mostrarNotificacion('✅ Puedes registrar la asistencia', 'success');
            setTimeout(() => window.location.href = 'ingreso.html', 500);
        });

        document.getElementById('guestName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('guestBtn').click();
        });

        function mostrarNotificacion(mensaje, tipo) {
            const t = document.createElement('div');
            t.className = `toast toast-${tipo}`;
            t.innerText = mensaje;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function iniciarSesion() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                mostrarNotificacion('❌ Completa todos los campos', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Ingresando...';

            setTimeout(() => {
                const usuarios = JSON.parse(localStorage.getItem('iglesia_usuarios') || '[]');
                const usuario = usuarios.find(u => u.email === email && u.password === password);

                if (usuario) {
                    localStorage.setItem('usuarioActual', JSON.stringify({
                        nombre: usuario.nombre,
                        email: usuario.email,
                        rol: usuario.rol,
                        sede: usuario.sede || 'admin'
                    }));
                    mostrarNotificacion('✅ ¡Bienvenido ' + usuario.nombre + '!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    mostrarNotificacion('❌ Correo o contraseña incorrectos', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Iniciar Sesión';
                }
            }, 300);
        }

        document.getElementById('loginEmail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('loginBtn').addEventListener('click', iniciarSesion);
    </script>
</body>
</html>
