<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Iglesia Agua Viva | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            padding: 14px;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">⛪</div>
                <h1>Iglesia Agua Viva</h1>
                <p>Sistema de Gestión de Servicios</p>
            </div>
            <div class="form-group">
                <label>📧 Correo Electrónico</label>
                <input type="email" id="loginEmail" class="input" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="loginPassword" class="input" placeholder="••••••••">
            </div>
            <button id="loginBtn" class="btn">Iniciar Sesión</button>
        </div>
    </div>

    <script>
        const USERS = [
            { email: "jhonfernandezcondor@gmail.com", password: "JSferco18", nombre: "Jhon Smith", rol: "admin" },
            { email: "kperezsuasnabar@gmail.com", password: "72566646", nombre: "Patricia Perez", rol: "admin" }
        ];

        if (!localStorage.getItem('iglesia_usuarios')) {
            localStorage.setItem('iglesia_usuarios', JSON.stringify(USERS));
        }

        function mostrarNotificacion(mensaje, tipo) {
            const t = document.createElement('div');
            t.className = `toast toast-${tipo}`;
            t.innerText = mensaje;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function iniciarSesion() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                mostrarNotificacion('❌ Completa todos los campos', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Ingresando...';

            setTimeout(() => {
                const usuarios = JSON.parse(localStorage.getItem('iglesia_usuarios') || '[]');
                const usuario = usuarios.find(u => u.email === email && u.password === password);

                if (usuario) {
                    localStorage.setItem('usuarioActual', JSON.stringify({
                        nombre: usuario.nombre,
                        email: usuario.email,
                        rol: usuario.rol,
                        sede: usuario.sede || 'admin'
                    }));
                    mostrarNotificacion('✅ ¡Bienvenido ' + usuario.nombre + '!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    mostrarNotificacion('❌ Correo o contraseña incorrectos', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Iniciar Sesión';
                }
            }, 300);
        }

        document.getElementById('loginEmail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('loginBtn').addEventListener('click', iniciarSesion);
    </script>
</body>
</html>
