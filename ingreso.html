<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Registrar Servicio | Iglesia Agua Viva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f9ff; min-height: 100vh; padding: 20px; }
        .form-container { max-width: 900px; margin: 0 auto; }
        .form-card { background: white; border-radius: 20px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #bae6fd; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo-icon { font-size: 48px; margin-bottom: 10px; }
        .logo h1 { font-size: 22px; font-weight: 800; color: #0c4a6e; }
        .logo p { color: #64748b; font-size: 13px; margin-top: 4px; }

        .section-title {
            font-size: 18px; font-weight: 800; margin: 24px 0 18px 0;
            color: #0c4a6e; display: flex; align-items: center; gap: 8px;
        }
        .section-title:first-of-type { margin-top: 0; }

        .double-input { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 6px; }
        .form-control, .form-select {
            width: 100%; padding: 13px 16px; border: 1.5px solid #bae6fd; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 15px; transition: all 0.2s;
            background: #f8fafc; color: #0c4a6e;
        }
        .form-control:focus, .form-select:focus { outline: none; border-color: #0284c7; background: white; box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }
        .form-control::placeholder { color: #94a3b8; font-size: 14px; }
        select.form-select { cursor: pointer; }
        select.form-select:focus { background: white; }

        .ministerio-card {
            background: #f8fafc; border-radius: 14px; padding: 18px; margin-bottom: 14px;
            transition: all 0.2s; border: 1px solid #bae6fd;
        }
        .ministerio-card:hover { border-color: #cbd5e1; }
        .ministerio-nombre { font-weight: 700; margin-bottom: 14px; color: #0c4a6e; font-size: 15px; display: flex; align-items: center; gap: 8px; }

        .count-col label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 6px; text-align: center; }

        .number-control {
            display: flex; align-items: center; gap: 10px; background: #f8fafc;
            border-radius: 60px; border: 1.5px solid #bae6fd; padding: 3px; transition: all 0.2s;
        }
        .number-control:focus-within { border-color: #0284c7; background: white; box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }
        .number-control input {
            flex: 1; border: none; text-align: center; font-size: 17px; font-weight: 700;
            padding: 8px 0; background: transparent; font-family: 'Inter', sans-serif; color: #0c4a6e;
        }
        .number-control input:focus { outline: none; }
        .number-control input[type="number"] { -moz-appearance: textfield; }
        .number-control input::-webkit-inner-spin-button,
        .number-control input::-webkit-outer-spin-button { display: none; }
        .number-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; background: #f1f4f9;
            font-size: 22px; font-weight: 700; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; color: #475569;
        }
        .number-btn:hover { background: #0c4a6e; color: white; }

        .btn-save {
            width: 100%; background: #0c4a6e; color: white; border: none;
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 28px; transition: background 0.2s;
        }
        .btn-save:hover { background: #0369a1; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-back {
            width: 100%; background: white; border: 1.5px solid #bae6fd; padding: 12px; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.2s; color: #475569;
        }
        .btn-back:hover { background: #f1f4f9; border-color: #cbd5e1; }

        .guest-banner {
            background: #f0fdf4; border: 1.5px solid #86efac;
            border-radius: 14px; padding: 14px 18px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .guest-banner p { font-size: 14px; color: #166534; font-weight: 600; margin: 0; }
        .guest-banner a { font-size: 13px; color: #0c4a6e; font-weight: 600; text-decoration: none; border-bottom: 1px solid transparent; }
        .guest-banner a:hover { border-bottom-color: #0c4a6e; }

        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px;
            border-radius: 60px; color: white; text-align: center; font-weight: 500; font-size: 14px; z-index: 1100;
            animation: slideUp 0.3s;
        }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 600px) {
            .form-card { padding: 24px; }
            .double-input { grid-template-columns: 1fr; gap: 12px; }
            .number-btn { width: 38px; height: 38px; font-size: 20px; }
            .section-title { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <div id="guestBanner" class="guest-banner" style="display:none;">
                <p>👤 Modo invitado — <a href="guest.html" style="font-weight:600;color:#0c4a6e;">← Volver</a> o <a href="edl.html" style="font-weight:700;color:#0c4a6e;">inscríbete a la EDL</a></p>
                <a href="#" style="color:#dc2626;font-size:13px;" onclick="if(confirm('¿Cerrar sesión?')){localStorage.removeItem('usuarioActual');window.location.href='index.html';}return false;">Salir</a>
            </div>
            <div class="logo">
                <div class="logo-icon">⛪</div>
                <h1>Registrar Servicio</h1>
                <p id="subtituloForm">Complete todos los datos del servicio</p>
            </div>
            <form id="registroForm">
                <div class="form-group" id="groupNombreInvitado" style="display:none;">
                    <label>👤 TU NOMBRE</label>
                    <input type="text" id="nombreInvitado" class="form-control" placeholder="Nombre del líder que registra">
                </div>
                <div class="double-input">
                    <div class="form-group">
                        <label>📅 FECHA</label>
                        <input type="date" id="fecha" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>📍 SEDE</label>
                        <select id="sede" class="form-select" required>
                            <option value="">Seleccionar</option>
                            <option value="san_carlos_10am">🏛️ San Carlos - 10am (Domingo)</option>
                            <option value="san_carlos_12pm">🏛️ San Carlos - 12pm (Domingo)</option>
                            <option value="san_carlos_5pm">🌙 San Carlos - 5pm (Sábado)</option>
                            <option value="san_carlos_7pm">🌙 San Carlos - 7pm (Sábado)</option>
                            <option value="el_tambo_12pm">🏛️ El Tambo - 12pm</option>
                            <option value="el_tambo_6pm">🌙 El Tambo - 6pm</option>
                            <option value="chupaca_6pm">🌙 Chupaca - 6pm</option>
                            <option value="jauja">🏔️ Jauja</option>
                            <option value="belen">🏠 Belén - Tu Casa</option>
                            <option value="transformando_ciudades">🌍 Transformando Ciudades</option>
                        </select>
                    </div>
                </div>

                <div class="section-title">🎵 MINISTERIOS</div>
                <div id="ministeriosContainer"></div>

                <div class="section-title">👥 ASISTENTES</div>
                <div id="asistentesContainer"></div>

                <button type="submit" class="btn-save" id="btnGuardar">💾 GUARDAR REGISTRO</button>
                <button type="button" class="btn-back" id="btnVolver">← VOLVER</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        Auth.permitirRegistro();
        const esInvitado = Auth.esInvitado();
        const esAdmin = Auth.esAdmin();
        const usuario = Auth.getUsuario();

        if (esInvitado) {
            document.getElementById('guestBanner').style.display = 'flex';
            document.getElementById('groupNombreInvitado').style.display = 'block';
            document.getElementById('nombreInvitado').value = usuario.nombre !== 'Invitado' ? usuario.nombre : '';
            document.getElementById('subtituloForm').textContent = 'Registra la asistencia de tu servicio';
            document.getElementById('btnVolver').onclick = () => { window.location.href = 'guest.html'; };
        } else if (esAdmin) {
            document.getElementById('subtituloForm').textContent = 'Registro como administrador';
            document.getElementById('btnVolver').onclick = () => { window.location.href = 'dashboard.html'; };
        }

        const ministerios = [
            { nombre: 'Alabanza', id: 'alabanza', icono: '🎸' },
            { nombre: 'Producción', id: 'produccion', icono: '🎛️' },
            { nombre: 'Servidores', id: 'servidores', icono: '🛡️' },
            { nombre: 'Conexión', id: 'conexion', icono: '🤝' },
            { nombre: 'Maestros Kids', id: 'maestros', icono: '👩‍🏫' }
        ];

        const asistentes = [
            { nombre: 'Adultos', id: 'adultos', icono: '👨' },
            { nombre: 'Kids (Niños)', id: 'kids', icono: '🧒' }
        ];

        function crearControlNumerico(id, etiqueta) {
            const col = document.createElement('div');
            col.className = 'count-col';
            col.innerHTML = `<label>${etiqueta}</label>`;

            const div = document.createElement('div');
            div.className = 'number-control';

            const btnMinus = document.createElement('button');
            btnMinus.type = 'button';
            btnMinus.className = 'number-btn';
            btnMinus.textContent = '−';

            const input = document.createElement('input');
            input.type = 'number';
            input.id = id;
            input.value = '0';
            input.min = '0';
            input.setAttribute('inputmode', 'numeric');

            input.addEventListener('keydown', (e) => {
                if (e.key === '-' || e.key === 'e' || (isNaN(Number(e.key)) && e.key !== 'Backspace' && e.key !== 'Tab' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight')) {
                    e.preventDefault();
                }
            });
            input.addEventListener('change', () => {
                let val = parseInt(input.value);
                if (isNaN(val) || val < 0) input.value = 0;
            });
            input.addEventListener('click', () => input.select());

            const btnPlus = document.createElement('button');
            btnPlus.type = 'button';
            btnPlus.className = 'number-btn';
            btnPlus.textContent = '+';

            btnMinus.onclick = () => { let val = parseInt(input.value) || 0; if (val > 0) input.value = val - 1; };
            btnPlus.onclick = () => { let val = parseInt(input.value) || 0; input.value = val + 1; };

            div.appendChild(btnMinus);
            div.appendChild(input);
            div.appendChild(btnPlus);
            col.appendChild(div);
            return col;
        }

        function cargarFormulario() {
            const ministeriosContainer = document.getElementById('ministeriosContainer');
            ministeriosContainer.innerHTML = '';
            ministerios.forEach(m => {
                const card = document.createElement('div');
                card.className = 'ministerio-card';
                card.innerHTML = `<div class="ministerio-nombre">${m.icono} ${m.nombre}</div><div class="double-input"></div>`;
                const doubleDiv = card.querySelector('.double-input');
                doubleDiv.appendChild(crearControlNumerico(`${m.id}V`, '👨 Hombres'));
                doubleDiv.appendChild(crearControlNumerico(`${m.id}M`, '👩 Mujeres'));
                ministeriosContainer.appendChild(card);
            });

            const asistentesContainer = document.getElementById('asistentesContainer');
            asistentesContainer.innerHTML = '';
            asistentes.forEach(a => {
                const card = document.createElement('div');
                card.className = 'ministerio-card';
                const labels = a.id === 'kids' ? ['👦 Niños', '👧 Niñas'] : ['👨 Hombres', '👩 Mujeres'];
                card.innerHTML = `<div class="ministerio-nombre">${a.icono} ${a.nombre}</div><div class="double-input"></div>`;
                const doubleDiv = card.querySelector('.double-input');
                doubleDiv.appendChild(crearControlNumerico(`${a.id}V`, labels[0]));
                doubleDiv.appendChild(crearControlNumerico(`${a.id}M`, labels[1]));
                asistentesContainer.appendChild(card);
            });
        }

        function obtenerDatos() {
            const datos = { fecha: document.getElementById('fecha').value, sede: document.getElementById('sede').value, ministerios: {}, asistentes: {} };
            ministerios.forEach(m => {
                datos.ministerios[m.id] = {
                    v: Number(document.getElementById(`${m.id}V`)?.value) || 0,
                    m: Number(document.getElementById(`${m.id}M`)?.value) || 0
                };
            });
            asistentes.forEach(a => {
                datos.asistentes[a.id] = {
                    v: Number(document.getElementById(`${a.id}V`)?.value) || 0,
                    m: Number(document.getElementById(`${a.id}M`)?.value) || 0
                };
            });
            return datos;
        }

        function obtenerSemana(fecha) {
            if (!fecha) return '';
            const d = new Date(fecha + 'T12:00:00');
            const dayNum = d.getDay() || 7;
            d.setDate(d.getDate() + 4 - dayNum);
            const yearStart = new Date(d.getFullYear(), 0, 1);
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
        }

        function toast(msg, tipo = 'success') {
            let t = document.createElement('div');
            t.className = 'toast toast-' + tipo;
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            const datos = obtenerDatos();

            if (!datos.fecha) { toast('❌ Seleccione una fecha', 'error'); return; }
            if (!datos.sede) { toast('❌ Seleccione una sede', 'error'); return; }

            let nombreRegistro = esAdmin ? (usuario.nombre || 'Administrador') : document.getElementById('nombreInvitado').value.trim();
            if (esInvitado && !nombreRegistro) {
                toast('❌ Escribe tu nombre para identificar el registro', 'error');
                return;
            }
            if (esInvitado) Auth.entrarComoInvitado(nombreRegistro);

            const totalMinisteriosV = Object.values(datos.ministerios).reduce((s, m) => s + m.v, 0);
            const totalMinisteriosM = Object.values(datos.ministerios).reduce((s, m) => s + m.m, 0);
            const totalAdultosV = datos.asistentes.adultos.v;
            const totalAdultosM = datos.asistentes.adultos.m;
            const totalKidsV = datos.asistentes.kids.v;
            const totalKidsM = datos.asistentes.kids.m;

            const nuevoRegistro = {
                fecha: datos.fecha,
                sede: datos.sede,
                semana: obtenerSemana(datos.fecha),
                mes: datos.fecha.substring(0, 7),
                totalGeneral: totalMinisteriosV + totalMinisteriosM + totalAdultosV + totalAdultosM + totalKidsV + totalKidsM,
                totalVarones: totalMinisteriosV + totalAdultosV + totalKidsV,
                totalMujeres: totalMinisteriosM + totalAdultosM + totalKidsM,
                totalKV: totalKidsV,
                totalKM: totalKidsM,
                ministerios: datos.ministerios,
                asistentes: datos.asistentes,
                registradoPor: nombreRegistro,
                origen: esInvitado ? 'invitado' : 'admin',
                creadoEn: new Date().toISOString()
            };

            btn.disabled = true;
            btn.innerText = 'Guardando...';

            try {
                await firebaseReady;
                await db.collection('registros').add(nuevoRegistro);
                toast('✅ Registro guardado exitosamente');
                if (esInvitado) {
                    document.getElementById('registroForm').reset();
                    document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
                    cargarFormulario();
                    btn.disabled = false;
                    btn.innerText = '💾 GUARDAR REGISTRO';
                } else {
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                }
            } catch (err) {
                console.error('Error Firebase:', err);
                toast('❌ Error al guardar: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerText = '💾 GUARDAR REGISTRO';
            }
        });

        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
        cargarFormulario();
    </script>
</body>
</html>
